<!DOCTYPE html>
<head>
    <title>Functions</title>
</head>
<body>
    <h1>Functions</h1>
    <script>
    //log is a function
    console.log("test"); //call (or execute) it

    //we can make our own functions!
    function sayHi(){
        console.log("hi");
    }

    sayHi(); //<-now we're executing it
    sayHi();
    sayHi();

    //functions can take input
    function sayHiToSomeone(who){
        console.log("hi "+who);
    }

    sayHiToSomeone("Sean");
    sayHiToSomeone("Kyle");

    //functions can take multiple inputs
    function sayHiToTwoPeople(who1, who2){
        console.log("hi " + who1 + " and " + who2);
    }

    sayHiToTwoPeople("elmo","bluey");

    </script>
</body>
</html>
